<html>

<head>

<meta http-equiv="content-type" content="text/html; charset=utf-8">

<link rel="shortcut icon" href="./img/favicon.ico" type="image/x-icon" />

<title>References supplementer | ParsedClassics</title>

<link type="text/css" rel="stylesheet" href="./css/w3.css" />

<link type="text/css" rel="stylesheet" href="./css/pc.css" />

<script type="text/javascript" src="./js/jquery-2.1.1.js"></script>

<script type="text/javascript" src="./js/parsedclassics.vars.js"></script>

<script type="text/javascript" src="./js/parsedclassics.widgets.js"></script>

<script type="text/javascript" src="./js/parsedclassics.tools.js"></script>

<script>

$(document).ready(function(){
  ParsedClassicsGrammarRefsSupplementer.init();
});

$(document).ready(function(){
  ParsedClassicsModalDialogues.initAllCloseDialogueButtons();
});
  
</script>

<body id="tools_page">

<script type="text/javascript" src="./js/_navigation.js"></script>

<div id="pc-site-content" class="pc-center-pane-maxwidth w3-border-right w3-padding pc-padding-top-0 pc-overflow-visible">

<div class="pc-overflow-auto"> <!-- needed in order to avoid h1 element's margin pushing its parent element down -->

<h1>References supplementer</h1>

<h2>References to be supplemented code input:</h2>

</div>

<textarea id="pc-textarea-input" class="pc-width-100"></textarea>

<div class="pc-padding-8"><button id="pc-load-button" class="w3-button w3-hover-white w3-border w3-padding-small w3-ripple w3-round-small w3-hover-border-dark-grey">Load refs</button></div>

<h2>References to be added code input:</h2>

<textarea id="pc-textarea-input2" class="pc-width-100"></textarea>

<div class="pc-padding-8"><button id="pc-load-button2" class="w3-button w3-hover-white w3-border w3-padding-small w3-ripple w3-round-small w3-hover-border-dark-grey">Load refs</button> <button id="pc-generate-button" class="w3-button w3-hover-white w3-border w3-padding-small w3-ripple w3-round-small w3-hover-border-dark-grey">Supplement refs</button></div>

<h2>References code output:</h2>

<textarea id="pc-textarea-output" class="pc-width-100"></textarea>

<div class="pc-padding-8"><button id="pc-check-button" class="w3-button w3-hover-white w3-border w3-padding-small w3-ripple w3-round-small w3-hover-border-dark-grey">Check for completeness</button></div>

<h2>References not added code output:</h2>

<div class="pc-padding-bottom-8 pc-overflow-auto"><textarea id="pc-textarea-output2" class="pc-width-100"></textarea></div>

<h2>References supplemented:</h2>

<div id="pc-append-code-container3" class="pc-hide pc-show-verses"></div>

<h2>References to be added:</h2>

<div id="pc-append-code-container2" class="pc-hide pc-show-verses"></div>

<h2>References to be supplemented:</h2>

<div id="pc-append-code-container" class="pc-hide pc-show-verses pc-overflow-unset"></div>


<!-- Modal dialogue code shoud be below all content -->

<div id="pc-tools-error-dialogue" class="w3-modal">

  <div class="w3-modal-content w3-card-4 w3-animate-zoom">
 
   <header class="w3-container w3-dark-grey"> 
 
    <span class="pc-close-dialogue_button w3-button w3-dark-grey w3-xlarge w3-hover-white w3-display-topright">&times;</span>
 
    <h2>Error</h2>
 
   </header>
 
   <div id="error-msg-text-el" class="pc-modal-content-inner w3-container w3-padding-16">
 
   </div> <!-- End of div element containing message -->
 
  </div>  <!-- End of .w3-modal-content -->
 
</div> <!-- End of #pc-tools-dialogue -->

</div> <!-- End of #pc-site-content -->

</body>
   
</html>
