<html>

<head>

<meta http-equiv="content-type" content="text/html; charset=utf-8">

<link rel="shortcut icon" href="./img/favicon.ico" type="image/x-icon" />

<title>Commentary references generator | ParsedClassics</title>

<link type="text/css" rel="stylesheet" href="./css/w3.css" />

<link type="text/css" rel="stylesheet" href="./css/pc.css" />

<script type="text/javascript" src="./js/jquery-2.1.1.js"></script>

<script type="text/javascript" src="./js/parsedclassics.vars.js"></script>

<script type="text/javascript" src="./js/parsedclassics.widgets.js"></script>

<script type="text/javascript" src="./js/parsedclassics.tools.js"></script>

<script>

$(document).ready(function(){
  ParsedClassicsCommentaryRefsGenerator.init();
});

$(document).ready(function(){
  ParsedClassicsModalDialogues.initAllCloseDialogueButtons();
});
    
</script>

</head>

<body id="tools_page">

<script type="text/javascript" src="./js/_navigation.js"></script>

<div id="pc-site-content" class="pc-center-pane-maxwidth w3-border-right w3-padding pc-padding-top-0 pc-overflow-visible">

<div class="pc-overflow-auto"> <!-- needed in order to avoid h1 element's margin pushing its parent element down -->       

<h1>Commentary references generator</h1>

<h2>File number offset input:</h2>

</div>

<input id="file-num-offset-input" type="text" class="pc-width-100">

<h2>Scanned book shortname input:</h2>

<input id="scanned-book-shortname-input" type="text" class="pc-width-100">

<h2>Scanned book shorttitle input:</h2>

<input id="scanned-book-shorttitle-input" type="text" class="pc-width-100">

<h2>Commentators names list input:</h2>

<textarea id="commentators-names-input" class="pc-width-100"></textarea>

<h2>Collection content object input:</h2>

<textarea id="coll-content-input" class="pc-width-100"></textarea>

<div class="pc-padding-8"><button id="load-button" class="w3-button w3-hover-white w3-border w3-padding-small w3-ripple w3-round-small w3-hover-border-dark-grey">Load</button></div>

<h2>Commentary references data inputs:</h2>

<div id="data-inputs-area"></div>

<div class="pc-padding-8"><button id="generate-button" class="w3-button w3-hover-white w3-border w3-padding-small w3-ripple w3-round-small w3-hover-border-dark-grey">Generate code</button></div>

<h2>Commentary references code output:</h2>

<textarea id="grammar-refs-output" class="pc-width-100"></textarea>

<!-- Modal dialogue code shoud be below all content -->

<div id="pc-tools-error-dialogue" class="w3-modal">

  <div class="w3-modal-content w3-card-4 w3-animate-zoom">
 
   <header class="w3-container w3-dark-grey"> 
 
    <span class="pc-close-dialogue_button w3-button w3-dark-grey w3-xlarge w3-hover-white w3-display-topright">&times;</span>
 
    <h2>Error</h2>
 
   </header>
 
   <div id="error-msg-text-el" class="pc-modal-content-inner w3-container w3-padding-16">
 
   </div> <!-- End of div element containing message -->
 
  </div>  <!-- End of .w3-modal-content -->
 
</div> <!-- End of #pc-tools-dialogue -->

</div> <!-- End of #pc-site-content -->

</body>

</html>
