        <header class="w3-container w3-dark-grey">
          <span
            class="pc-close-dialogue-button w3-button w3-dark-grey w3-xlarge w3-hover-white w3-display-topright"

    <div id="pc-tools-attention-dialogue" class="w3-modal">
