<html>



<head>



<meta http-equiv="content-type" content="text/html; charset=utf-8">



<link rel="shortcut icon" href="./img/favicon.ico" type="image/x-icon" />



<title>Parsed text  contents generator | ParsedClassics</title>



<link type="text/css" rel="stylesheet" href="./css/w3.css" />



<link type="text/css" rel="stylesheet" href="./css/pc.css" />

	

<script type="text/javascript" src="./js/jquery-2.1.1.js"></script>

	

<script type="text/javascript" src="./js/parsedclassics.vars.js"></script>

	

<script type="text/javascript" src="./js/parsedclassics.widgets.js"></script>

	

<script type="text/javascript" src="./js/parsedclassics.tools.js"></script>

	

<script>

$(document).ready(function(){



		ParsedClassicsCollContentsGenerator.init();



});

	

$(document).ready(function(){



		ParsedClassicsModalDialogues.initAllCloseDialogueButtons();



});

</script>



</head>



<body id="tools_page">



<script type="text/javascript" src="./js/_navigation.js"></script>

	

<div id="pc-site-content" class="pc-center-pane-maxwidth w3-border-right w3-padding pc-padding-top-0 pc-overflow-visible">

<div class="pc-overflow-auto"> <!-- needed in order to avoid h1 element's margin pushing its parent element down -->	

<h1>Parsed text contents generator</h1>



<h2>Contents shortname input:</h2>

</div>

<input id="pc-textarea-input3" type="text" class="pc-width-100">

	

<h2>Line index prefix input:</h2>

	

<span class="resizable-input-v3"><input id="pc-textarea-input2" type="text" class="pc-width-100"></span>



<h2>Line number prefix input:</h2>

	

<span class="resizable-input-v3"><input id="pc-textarea-input4" type="text" class="pc-width-100"></span>



<h2>Line range input:</h2>

	

<span class="resizable-input-v3"><input id="pc-textarea-input" type="text" class="pc-width-100"></span>



<div class="pc-padding-8"><button id="pc-generate-button" class="w3-button w3-hover-white w3-border w3-padding-small w3-ripple w3-round-small w3-hover-border-dark-grey">Generate contents</button></div>



<h2>Contents code output:</h2>

	

<textarea id="pc-textarea-output" class="pc-width-100"></textarea>



<!-- Modal dialogue code shoud be below all content -->

<div id="pc-tools-error-dialogue" class="w3-modal">

 <div class="w3-modal-content w3-card-4 w3-animate-zoom">

  <header class="w3-container w3-dark-grey"> 

   <span class="pc-close-dialogue_button w3-button w3-dark-grey w3-xlarge w3-hover-white w3-display-topright">&times;</span>

   <h2>Error</h2>

  </header>

  

  <div id="error-msg-text-el" class="pc-modal-content-inner w3-container w3-padding-16">

  </div> <!-- End of div element containing message -->



 </div>  <!-- End of .w3-modal-content -->

</div> <!-- End of #pc-tools-dialogue -->



</div> <!-- End of #pc-site-content -->

	

</body>



</html>
