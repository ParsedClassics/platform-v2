<textarea id="answers" class="pc-hide">=== Verbs, Subjunctive Active and Passive, AB (-ω) -> Γ1 (-γομαι) Group ===

--- AB -> Γ1 Group, -ω, -γομαι (ακούω, ακούγομαι) ---
--- only 7 verbs in this group: πάω*, λέω, ακούω, τρώω, κλαίω, καιω, φταίω*  ---
--- * does not have passive forms ---

--- Present Active ---
Hear: να ακούω να ακούς να ακούει να ακούμε να ακούτε να ακούν

--- Aorist Active ---
Hear: να ακούσω να ακούσεις να ακούσει να ακούσουμε να ακούσετε να ακούσουν

--- Perfect Active ---
Hear: να έχω ακούσει να έχεις ακούσει να έχει ακούσει να έχουμε ακούσει να έχετε ακούσει να έχουν ακούσει

--- Present Passive ---
Hear: να ακούγομαι να ακούγεσαι να ακούγεται να ακουγόμαστε να ακούγεστε να ακούγονται

--- Aorist Passive ---
Hear: να ακουστώ να ακουστείς να ακουστεί να ακουστούμε να ακουστείτε να ακουστούν

--- Perfect Passive ---
Hear: να έχω ακουστεί να έχεις ακουστεί να έχει ακουστεί να έχουμε ακουστεί να έχετε ακουστεί να έχουν ακουστεί</textarea>
