<textarea id="answers" class="pc-hide">=== Verbs, Indicative Active ===

--- 1-st conj. -ω, -ομαι (λύνω) ---
--- 2-nd conj. -ώ, -ούμαι/-ιέμαι (χτυπώ) ---

--- Present ---
Loosen: λύνω λύνεις λύνει λύνουμε λύνετε λύνουν
Strike: χτυπώ χτυπάς χτυπά χτυπάμε χτυπάτε χτυπούν

--- Imperfect ---
Loosen: έλυνα έλυνες έλυνε λύναμε λύνατε έλυναν
Strike: χτυπούσα χτυπούσες χτυπούσε χτυπούσαμε χτυπούσατε χτυπούσαν

--- Aorist ---
Loosen: έλυσα έλυσες έλυσε λύσαμε λύσατε έλυσαν
Strike: χτύπησα χτύπησες χτύπησε χτυπήσαμε χτυπήσατε χτύπησαν

--- Continuous Future ---
Loosen: θα λύνω θα λύνεις θα λύνει θα λύνουμε θα λύνετε θα λύνουν
Strike: θα χτυπώ θα χτυπάς θα χτυπά θα χτυπάμε θα χτυπάτε θα χτυπούν

--- Simple Future ---
Loosen: θα λύσω θα λύσεις θα λύσει θα λύσουμε θα λύσετε θα λύσουν
Strike: θα χτυπήσω θα χτυπήσεις θα χτυπήσει θα χτυπήσουμε θα χτυπήσετε θα χτυπήσουν

--- Perfect ---
Loosen: έχω λύσει έχεις λύσει έχει λύσει έχουμε λύσει έχετε λύσει έχουν λύσει
Strike: έχω χτυπήσει έχεις χτυπήσει έχει χτυπήσει έχουμε χτυπήσει έχετε χτυπήσει έχουν χτυπήσει

--- Pluperfect ---
Loosen: είχα λύσει είχες λύσει είχε λύσει είχαμε λύσει είχατε λύσει είχαν λύσει
Strike: είχα χτυπήσει είχες χτυπήσει είχε χτυπήσει είχαμε χτυπήσει είχατε χτυπήσει είχαν χτυπήσει

--- Future Perfect ---
Loosen: θα έχω λύσει θα έχεις λύσει θα έχει λύσει θα έχουμε λύσει θα έχετε λύσει θα έχουν λύσει
