<textarea id="answers" class="pc-hide">=== Thematic Verbs (vocalic contract), Indicative Middle and Passive ===

--- α-contract τιμάω, τιμήσω, ἐτίμησα, τετίμηκα, τετίμημαι, ἐτιμήθην ---
--- ε-contract φιλέω, φιλήσω, ἐφίλησα, πεφίληκα, πεφίλημαι, ἐφιλήθην ---
--- ο-contract δηλόω, δηλώσω, ἐδήλωσα, δεδήλωκα, δεδήλωμαι, ἐδελώθην ---

--- Present Middle ---
Honour: τιμῶμαι τιμᾷ τιμᾶται τιμώμεθα τιμᾶσθε τιμῶνται
Love: φιλοῦμαι φιλῇ φιλεῖται φιλούμεθα φιλεῖσθε φιλοῦνται
Show: δηλοῦμαι δηλοῖ δηλοῦται δηλούμεθα δηλοῦσθε δηλοῦνται

--- Imperfect Middle ---
Honour: ἐτιμώμην ἐτιμῶ ἐτιμᾶτο ἐτιμώμεθα ἐτιμᾶσθε ἐτιμῶντο
Love: ἐφιλούμην ἐφιλοῦ ἐφιλεῖτο ἐφιλούμεθα ἐφιλεῖσθε ἐφιλοῦντο
Show: ἐδηλούμην ἐδηλοῦ ἐδηλοῦτο ἐδηλούμεθα ἐδηλοῦσθε ἐδηλοῦντο

--- Future Middle ---
Honour: τιμήσομαι τιμήσῃ τιμήσεται τιμησόμεθα τιμήσεσθε τιμήσονται
Love: φιλήσομαι φιλήσῃ φιλήσεται φιλησόμεθα φιλήσεσθε φιλήσονται
Show: δηλώσομαι δηλώσῃ δηλώσεται δηλωσόμεθα δηλώσεσθε δηλώσονται

--- Aorist Middle ---
Honour: ἐτιμησάμην ἐτιμήσω ἐτιμήσατο ἐτιμησάμεθα ἐτιμήσασθε ἐτιμήσαντο
Love: ἐφιλησάμην ἐφιλήσω ἐφιλήσατο ἐφιλησάμεθα ἐφιλήσασθε ἐφιλήσαντο
Show: ἐδηλωσάμην ἐδηλώσω ἐδηλώσατο ἐδηλωσάμεθα ἐδηλώσασθε ἐδηλώσαντο

--- Perfect Middle ---
Honour: τετίμημαι τετίμησαι τετίμηται τετιμήμεθα τετίμησθε τετίμηνται
Love: πεφίλημαι πεφίλησαι πεφίληται πεφιλήμεθα πεφίλησθε πεφίληνται
Show: δεδήλωμαι δεδήλωσαι δεδήλωται δεδηλώμεθα δεδήλωσθε δεδήλωνται

--- Pluperfect Middle ---
Honour: ἐτετιμήμην ἐτετίμησο ἐτετίμητο ἐτετιμήμεθα ἐτετίμησθε ἐτετίμηντο
Love: ἐπεφιλήμην ἐπεφίλησο ἐπεφίλητο ἐπεφιλήμεθα ἐπεφίλησθε ἐπεφίληντο

--- Future Perfect Middle ---

Love: πεφιλήσομαι πεφιλήσῃ πεφιλήσεται πεφιλησόμεθα πεφιλήσεσθε πεφιλήσονται
Show: δεδηλώσομαι δεδηλώσῃ δεδηλώσεται δεδηλωσόμεθα δεδηλώσεσθε δεδηλώσονται

--- Future Passive ---
