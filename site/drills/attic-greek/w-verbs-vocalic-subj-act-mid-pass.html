<textarea id="answers" class="pc-hide">=== Thematic Verbs (vocalic), Subjunctive Active, Middle and Passive ===

--- vocalic λύω, λύσω, ἔλυσα, λέλυκα, λέλυμαι, ἐλύθην  ---
--- vocalic παύω, παύσω, ἔπαυσα, πέπαυκα, πέπαυμαι, ἐπαύθην ---

--- Present Active ---
Loosen: λύω λύῃς λύῃ λύωμεν λύητε λύωσι
Stop: παύω παύῃς παύῃ παύωμεν παύητε παύωσι

--- Aorist Active ---
Loosen: λύσω λύσῃς λύσῃ λύσωμεν λύσητε λύσωσι
Stop: παύσω παύσῃς παύσῃ παύσωμεν παύσητε παύσωσι

--- Perfect Active ---
Loosen: λελύκω λελύκῃς λελύκῃ λελύκωμεν λελύκητε λελύκωσι
Stop: πεπαύκω πεπαύκῃς πεπαύκῃ πεπαύκωμεν πεπαύκητε πεπαύκωσι

--- Present Middle ---
Loosen: λύωμαι λύῃ λύηται λυώμεθα λύησθε λύωνται
Stop: παύωμαι παύῃ παύηται παυώμεθα παύησθε παύωνται

--- Aorist Middle ---
Loosen: λύσωμαι λύσῃ λύσηται λυσώμεθα λύσησθε λύσωνται
Stop: παύσωμαι παύσῃ παύσηται παυσώμεθα παύσησθε παύσωνται

--- Perfect Middle ---
Loosen: λελυμένος ὦ λελυμένος ᾖς λελυμένος ᾖ λελυμένοι ὦμεν λελυμένοι ἦτε λελυμένοι ὦσι
Stop: πεπαυμένος ὦ πεπαυμένος ᾖς πεπαυμένος ᾖ πεπαυμένοι ὦμεν πεπαυμένοι ἦτε πεπαυμένοι ὦσι

--- Aorist Passive ---
Loosen: λυθῶ λυθῇς λυθῇ λυθῶμεν λυθῆτε λυθῶσι
Stop: παυθῶ παυθῇς παυθῇ παυθῶμεν παυθῆτε παυθῶσι</textarea>
