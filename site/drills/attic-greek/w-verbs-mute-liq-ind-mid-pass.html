<textarea id="answers" class="pc-hide">=== Thematic Verbs (mute, liquid), Indicative Middle and Passive ===

--- mute πράττω, πράξω, ἔπραξα, πέπραχα, πέπραγμαι, ἐπράχθην ---
--- liquid κρίνω, κρινῶ, ἔκρινα, κέκρικα, κέκριμαι, ἐκρίθην ---
--- liquid with 2 aorist βάλλω, βαλῶ, ἔβαλον, βέβληκα, βέβλημαι, ἐβλήθην ---

--- Present Middle ---
Do: πράττομαι πράττῃ πράττεται πραττόμεθα πράττεσθε πράττονται
Judge: κρίνομαι κρίνῃ κρίνεται κρινόμεθα κρίνεσθε κρίνονται
Throw: βάλλομαι βάλλῃ βάλλεται βαλλόμεθα βάλλεσθε βάλλονται

--- Imperfect Middle ---
Do: ἐπραττόμην ἐπράττου ἐπράττετο ἐπραττόμεθα ἐπράττεσθε ἐπράττοντο
Judge: ἐκρινόμην ἐκρίνου ἐκρίνετο ἐκρινόμεθα ἐκρίνεσθε ἐκρίνοντο
Throw: ἐβαλλόμην ἐβάλλου ἐβάλλετο ἐβαλλόμεθα ἐβάλλεσθε ἐβάλλοντο

--- Future Middle ---
Do: πράξομαι πράξῃ πράξεται πραξόμεθα πράξεσθε πράξονται
Judge: κρινοῦμαι κρινῇ κρινεῖται κρινούμεθα κρινεῖσθε κρινοῦνται
Throw: βαλοῦμαι βαλῇ βαλεῖται βαλούμεθα βαλεῖσθε βαλοῦνται

--- Aorist Middle ---
Do: ἐπραξάμην ἐπράξω ἐπράξατο ἐπραξάμεθα ἐπράξασθε ἐπράξαντο
Judge: ἐκρινάμην ἐκρίνω ἐκρίνατο ἐκρινάμεθα ἐκρίνασθε ἐκρίναντο
Throw: ἐβαλόμην ἐβάλου ἐβάλετο ἐβαλόμεθα ἐβάλεσθε ἐβάλοντο

--- Perfect Middle ---
Do: πέπραγμαι πέπραξαι πέπρακται πεπράγμεθα πέπραχθε πεπραγμένοι εἰσί
Judge: κέκριμαι κέκρισαι κέκριται κεκρίμεθα κέκρισθε κέκρινται
Throw: βέβλημαι βέβλησαι βέβληται βεβλήμεθα βέβλησθε βέβληνται 

--- Pluperfect Middle ---
Do: ἐπεπράγμην ἐπέπραξο ἐπέπρακτο ἐπεπράγμεθα ἐπέπραχθε πεπραγμένοι ἦσαν
Judge: ἐκεκρίμην ἐκέκρισο ἐκέκριτο ἐκεκρίμεθα ἐκέκρισθε ἐκέκριντο 
Throw: ἐβεβλήμην ἐβέβλησο ἐβέβλητο ἐβεβλήμεθα ἐβέβλησθε ἐβέβληντο 

--- Future Perfect Middle ---
Do: πεπράξομαι πεπράξῃ πεπράξεται πεπραξόμεθα πεπράξεσθε πεπράξονται
Judge: -
Throw: -

--- Future Passive ---
Do: πραχθήσομαι πραχθήσῃ πραχθήσεται πραχθησόμεθα πραχθήσεσθε πραχθήσονται
Judge: κριθήσομαι κριθήσῃ κριθήσεται κριθησόμεθα κριθήσεσθε κριθήσονται
Throw: βληθήσομαι βληθήσῃ βληθήσεται βληθησόμεθα βληθήσεσθε βληθήσονται

--- Aorist Passive ---
Do: ἐπράχθην ἐπράχθης ἐπράχθη ἐπράχθημεν ἐπράχθητε ἐπράχθησαν
Judge: ἐκρίθην ἐκρίθης ἐκρίθη ἐκρίθημεν ἐκρίθητε ἐκρίθησαν
Throw: ἐβλήθην ἐβλήθης ἐβλήθη ἐβλήθημεν ἐβλήθητε ἐβλήθησαν</textarea>
