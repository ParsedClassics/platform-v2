<textarea id="answers" class="pc-hide">=== Pronouns, Reflexive and Reciprocal ===

--- 1-st person reflexive ἐμαυτοῦ ἐμαυτῆς ---
--- 2-nd person reflexive σεαυτοῦ σεαυτῆς ---
--- 3-rd person reflexive ἑαυτοῦ ἑαυτῆς ἑαυτοῦ ---
--- 3-rd person reflexive αὑτοῦ αὑτῆς αὑτοῦ ---
--- reciprocal ἀλλήλων ---

Myself (m. sg.): ἐμαυτοῦ ἐμαυτῷ ἐμαυτόν
Myself (m. pl.): ἡμῶν αὐτῶν ἡμῖν αὐτοῖς ἡμᾶς αὐτούς
Myself (f. sg.): ἐμαυτῆς ἐμαυτῇ ἐμαυτήν
Myself (f. pl.): ἡμῶν αὐτῶν ἡμῖν αὐταῖς ἡμᾶς αὐτάς

Yourself (m. sg.): σεαυτοῦ σεαυτῷ σεαυτόν
Yourself (m. pl.): ὑμῶν αὐτῶν ὑμῖν αὐτοῖς ὑμᾶς αὐτούς
Yourself (f. sg.): σεαυτῆς σεαυτῇ σεαυτήν
Yourself (f. pl.): ὑμῶν αὐτῶν ὑμῖν αὐταῖς ὑμᾶς αὐτάς

Himself (m. sg.): ἑαυτοῦ ἑαυτῷ ἑαυτόν

Himself (f. sg.): ἑαυτῆς ἑαυτῇ ἑαυτήν
Himself (f. pl.): ἑαυτῶν ἑαυταῖς ἑαυτάς
Himself (n. pl.): ἑαυτοῦ ἑαυτῷ ἑαυτό
Himself (n. sg.): ἑαυτῶν ἑαυτοῖς ἑαυτά

Himself (m. sg.): αὑτοῦ αὑτῷ αὑτόν

Himself (n. pl.): αὑτοῦ αὑτῷ αὑτό
