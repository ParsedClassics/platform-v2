<textarea id="answers" class="pc-hide">=== Thematic Verbs (mute, liquid), Imperative Active, Middle and Passive ===

--- mute πράττω, πράξω, ἔπραξα, πέπραχα, πέπραγμαι, ἐπράχθην ---
--- liquid κρίνω, κρινῶ, ἔκρινα, κέκρικα, κέκριμαι, ἐκρίθην ---
--- liquid with 2 aorist βάλλω, βαλῶ, ἔβαλον, βέβληκα, βέβλημαι, ἐβλήθην ---

--- Present Active ---
Do: πρᾶττε πραττέτω πράττετε πραττόντων
Judge: κρῖνε κρινέτω κρίνετε κρινόντων
Throw: βάλλε βαλλέτω βάλλετε βαλλόντων

--- Aorist Active ---
Do: πρᾶξον πραξάτω πράξατε πραξάντων
Judge: κρῖνον κρινάτω κρίνατε κρινάντων
Throw: βάλε βαλέτω βάλετε βαλόντων

--- Perfect Active ---
Do: πεπραχώς ἴσθι πεπραχώς ἔστω πεπραχότες ἔστε πεπραχότες ὄντων
Judge: κεκρικώς ἴσθι κεκρικώς ἔστω κεκρικότες ἔστε κεκρικότες ὄντων
Throw: βεβληκώς ἴσθι βεβληκώς ἔστω βεβληκότες ἔστε βεβληκότες ὄντων

--- Present Middle ---
Do: πράττου πραττέσθω πράττεσθε πραττέσθων
Judge: κρίνου κρινέσθω κρίνεσθε κρινέσθων
Throw: βάλλου βαλλέσθω βάλλεσθε βαλλέσθων

--- Aorist Middle ---
Do: πρᾶξαι πραξάσθω πράξασθε πραξάσθων 
Judge: κρῖναι κρινάσθω κρίνασθε κρινάσθων
Throw: βαλοῦ βαλέσθω βάλεσθε βαλέσθων

--- Perfect Middle ---
Do: πέπραξο πεπράχθω πέπραχθε πεπράχθων
Judge: κέκρισο κεκρίσθω κέκρισθε κεκρίσθων
Throw: βέβλησο βεβλήσθω βέβλησθε βεβλήσθων

--- Aorist Passive ---
Do: πράχθητι πραχθήτω πράχθητε πραχθέντων
Judge: κρίθητι κριθήτω κρίθητε κριθέντων
Throw: βλήθητι βληθήτω βλήθητε βληθέντων</textarea>
