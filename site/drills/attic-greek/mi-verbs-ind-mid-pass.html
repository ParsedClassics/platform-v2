<textarea id="answers" class="pc-hide">=== Athematic Verbs, Indicative Middle and Passive ===

--- w/present reduplicated τίθημι, θήσω, ἔθηκα, τέθηκα, τέθειμαι, ἐτέθην ---
--- w/present reduplicated δίδωμι, δώσω, ἔδωκα, δέδωκα, δέδομαι, ἐδόθην ---
--- w/suffix -νυ δείκνυμι, δείξω, ἔδειξα, δέδειχα, δέδειγμαι, ἐδείχθην ---

--- Present Middle ---
Place: τίθεμαι τίθεσαι τίθεται τιθέμεθα τίθεσθε τίθενται
Give: δίδομαι δίδοσαι δίδοται διδόμεθα δίδοσθε δίδονται
Show: δείκνυμαι δείκνυσαι δείκνυται δεικνύμεθα δείκνυσθε δείκνυνται

--- Imperfect Middle ---
Place: ἐτιθέμην ἐτίθεσο ἐτίθετο ἐτιθέμεθα ἐτίθεσθε ἐτίθεντο
Give: ἐδιδόμην ἐδίδοσο ἐδίδοτο ἐδιδόμεθα ἐδίδοσθε ἐδίδοντο
Show: ἐδεικνύμην ἐδείκνυσο ἐδείκνυτο ἐδεικνύμεθα ἐδείκνυσθε ἐδείκνυντο

--- Future Middle ---
Place: θήσομαι θήσῃ θήσεται θησόμεθα θήσεσθε θήσονται
Give: δώσομαι δώσῃ δώσεται δωσόμεθα δώσεσθε δώσονται
Show: δείξομαι δείξῃ δείξεται δειξόμεθα δείξεσθε δείξονται

--- Aorist Middle ---
Place: ἐθέμην ἔθου ἔθετο ἐθέμεθα ἔθεσθε ἔθεντο
Give: ἐδόμην ἔδου ἔδοτο ἐδόμεθα ἔδοσθε ἔδοντο
Show: ἐδειξάμην ἐδείξω ἐδείξατο ἐδειξάμεθα ἐδείξασθε ἐδείξαντο

--- Perfect Middle ---
Place*: τέθειμαι τέθεισαι τέθειται τεθείμεθα τέθεισθε τέθεινται
Give: δέδομαι δέδοσαι δέδοται δεδόμεθα δέδοσθε δέδονται
Show: δέδειγμαι δέδειξαι δέδεικται δεδείγμεθα δέδειχθε δεδειγμένοι εἰσί
---*Attic Greek commonly uses suppletive forms: κεῖμαι κεῖσαι κεῖται κείμεθα κεῖσθε κεῖνται ---

--- Pluperfect Middle ---
Place*: ἐτεθείμην ἐτέθεισο ἐτέθειτο ἐτεθείμεθα ἐτέθεισθε ἐτέθειντο
Give: ἐδεδόμην ἐδέδοσο ἐδέδοτο ἐδεδόμεθα ἐδέδοσθε ἐδέδοντο
Show: ἐδεδείγμην ἐδέδειξο ἐδέδεικτο ἐδεδείγμεθα ἐδέδειχθε δεδειγμένοι ἦσαν
---*Attic Greek commonly uses suppletive forms: ἐκείμην ἔκεισο ἔκειτο ἐκείμεθα ἔκεισθε ἔκειντο ---

--- Future Perfect Middle ---
Place: τεθειμένος ἔσομαι τεθειμένος ἔσῃ τεθειμένος ἔσται τεθειμένοι ἐσόμεθα τεθειμένοι ἔσεσθε τεθειμένοι ἔσονται
Give: δεδομένος ἔσομαι δεδομένος ἔσῃ δεδομένος ἔσται δεδομένοι ἐσόμεθα δεδομένοι ἔσεσθε δεδομένοι ἔσονται
Show: δεδειγμένος ἔσομαι δεδειγμένος ἔσῃ δεδειγμένος ἔσται δεδειγμένοι ἐσόμεθα δεδειγμένοι ἔσεσθε δεδειγμένοι ἔσονται

--- Future Passive ---
Place: τεθήσομαι τεθήσῃ τεθήσεται τεθησόμεθα τεθήσεσθε τεθήσονται
Give: δοθήσομαι δοθήσῃ δοθήσεται δοθησόμεθα δοθήσεσθε δοθήσονται
Show: δειχθήσομαι δειχθήσῃ δειχθήσεται δειχθησόμεθα δειχθήσεσθε δειχθήσονται

--- Aorist Passive ---
Place: ἐτέθην ἐτέθης ἐτέθη ἐτέθημεν ἐτέθητε ἐτέθησαν
Give: ἐδόθην ἐδόθης ἐδόθη ἐδόθημεν ἐδόθητε ἐδόθησαν
Show: ἐδείχθην ἐδείχθης ἐδείχθη ἐδείχθημεν ἐδείχθητε ἐδείχθησαν</textarea>
